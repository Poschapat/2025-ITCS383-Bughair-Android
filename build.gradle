plugins {
    id 'com.android.application' version '8.3.2' apply false
    id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
    // Add the SonarQube plugin here
    id "org.sonarqube" version "4.4.1.3373"
}

// This block tells the scanner where to send the data
sonar {
    properties {
        property "sonar.projectKey", "2025-itcs383-emerald-mobile_phase2" // Found in SonarQube dashboard
        property "sonar.organization", "2025-itcs383-emerald-mobile" // Found in SonarQube dashboard
        property "sonar.host.url", "https://sonarcloud.io"
        
        // Required for the >90% coverage check in D2
        property "sonar.junit.reportPaths", "build/test-results/testDebugUnitTest"
        property "sonar.coverage.jacoco.xmlReportPaths", "build/reports/jacoco/testDebugUnitTestCoverage/testDebugUnitTestCoverage.xml"
    }
}
